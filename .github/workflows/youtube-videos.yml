name: Update YouTube Videos

on:
  schedule:
    # Runs every day at 00:30 UTC
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  update-youtube-videos:
    name: Update README with latest YouTube videos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull in YouTube videos
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          comment_tag_name: 'YOUTUBE'
          feed_list: 'https://www.youtube.com/feeds/videos.xml?playlist_id=PLY67XcOB0u1SCXn5Z8ZcMnDJHWV4DuPvV'
          max_post_count: 5
          template: '- [$title]($url)  '
          committer_username: 'github-actions[bot]'
          committer_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Update YouTube videos'
