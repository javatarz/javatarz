name: Update YouTube Videos

on:
  schedule:
    # Runs every day at 00:30 UTC
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  update-youtube-videos:
    name: Update README with latest YouTube videos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: JasonEtco/rss-to-readme@v1
        with:
          feed-url: 'https://www.youtube.com/feeds/videos.xml?playlist_id=PLY67XcOB0u1SCXn5Z8ZcMnDJHWV4DuPvV'
          readme-section: 'youtube'
          max: 5
          template: '- [{{ title }}]({{ link }})'
